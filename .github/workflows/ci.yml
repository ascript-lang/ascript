name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Resilience against transient crates.io download hiccups (partial transfers).
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  test:
    name: build · test · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # The full default feature set: rusqlite is `bundled` and reqwest/tungstenite
      # use rustls, so no system libs (sqlite/openssl) are required. DB-backed tests
      # (postgres/redis) self-skip with no live server.
      - name: Build
        run: cargo build --all-targets

      - name: Test (default features)
        run: cargo test

      - name: Test (core, --no-default-features)
        run: cargo test --no-default-features

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (--no-default-features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings

  fuzz-smoke:
    name: fuzz · build + corpus smoke
    runs-on: ubuntu-latest
    # The DEEP campaign is fuzz-nightly.yml; this per-PR job is a fast tripwire — it builds
    # every libFuzzer target and runs each briefly over the COMMITTED seed corpus, so a PR
    # that reintroduces a crash reproducible from a seed fails immediately and cheaply. (The
    # property-test half of FUZZ runs in the `test` job's `cargo test`.)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target\nfuzz -> target"

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked || cargo install cargo-fuzz

      - name: Build all fuzz targets
        run: cargo +nightly fuzz build

      - name: Smoke each target over the committed corpus
        run: |
          for t in aso_roundtrip worker_serialize differential parser; do
            echo "::group::smoke $t"
            # `aso_roundtrip` is DECODE-ONLY — a leak there is a real `.aso` reader bug (and it
            # is BIN's gating target), so keep LeakSanitizer ON. The other targets RUN the
            # managed runtime, whose intentional PROCESS-LIFETIME state (interned `Rc<str>`,
            # `lazy_static`/`once_cell` globals, the tokio runtime, gcmodule's collector,
            # thread-locals) LSan cannot distinguish from leaks → disable leak detection there.
            # A genuine UNBOUNDED leak still surfaces as RSS growth → `-rss_limit_mb`.
            leak=1; [ "$t" = aso_roundtrip ] || leak=0
            # The committed ex_*/bad_* seeds are replayed first, so a seed-reproducible crash
            # fails here. 45s wall cap per target.
            cargo +nightly fuzz run "$t" -- \
              -max_total_time=45 -rss_limit_mb=4096 -timeout=25 -detect_leaks=$leak
            echo "::endgroup::"
          done
