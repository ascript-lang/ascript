id = "ascript"
name = "AScript"
description = "AScript language support for Zed: tree-sitter highlighting and the ascript language server."
version = "0.6.0"
schema_version = 1
authors = ["AScript contributors"]
repository = "https://github.com/ascript-lang/ascript"

[language_servers.ascript]
name = "AScript Language Server"
languages = ["AScript"]

[grammars.ascript]
# Standalone grammar, published from ascript-lang/ascript (the tree-sitter-ascript/ subtree).
# Zed's grammar table requires `rev` (the git revision), not `commit`.
repository = "https://github.com/ascript-lang/tree-sitter-ascript"
rev = "3c2bb8b5ffb4eef21b3f6224428ad248804fc338"
